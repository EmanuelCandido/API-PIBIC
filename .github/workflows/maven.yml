name: Maven Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependency review
        uses: actions/dependency-review-action@v5

  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Sistema_Crud_API_PIBIC

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run tests
        env:
          RUN_POSTGRES_TESTS: "true"
        run: |
          chmod +x mvnw
          ./mvnw clean test
