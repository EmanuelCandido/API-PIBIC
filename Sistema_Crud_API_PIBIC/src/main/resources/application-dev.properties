spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/CRUD_API}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.show-sql=${SHOW_SQL:true}

app.security.admin.username=${ADMIN_USER:admin}
app.security.admin.password=${ADMIN_PASSWORD:admin-dev-123}
app.security.professor.username=${PROFESSOR_USER:professor}
app.security.professor.password=${PROFESSOR_PASSWORD:professor-dev-123}
app.security.aluno.username=${ALUNO_USER:aluno}
app.security.aluno.password=${ALUNO_PASSWORD:aluno-dev-123}
app.security.jwt.secret=${JWT_SECRET:dev-only-sistema-api-pibic-secret-with-more-than-64-characters-2026}
app.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
app.docs.public=true
