spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.show-sql=false

app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:30}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.docs.public=false
app.security.require-https=true
app.security.bootstrap-admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.security.bootstrap-admin.username=${BOOTSTRAP_ADMIN_USER:}
app.security.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}

server.forward-headers-strategy=framework
server.shutdown=graceful
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.whitelabel.enabled=false

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
