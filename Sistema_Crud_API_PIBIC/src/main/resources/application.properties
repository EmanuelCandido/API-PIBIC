spring.application.name=SistemaCrud

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/CRUD_API}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.open-in-view=false
spring.flyway.enabled=${FLYWAY_ENABLED:true}

app.security.admin.username=${ADMIN_USER:admin}
app.security.admin.password=${ADMIN_PASSWORD:admin123}
app.security.professor.username=${PROFESSOR_USER:professor}
app.security.professor.password=${PROFESSOR_PASSWORD:professor123}
app.security.aluno.username=${ALUNO_USER:aluno}
app.security.aluno.password=${ALUNO_PASSWORD:aluno123}
app.security.jwt.secret=${JWT_SECRET:sistema-api-pibic-dev-secret-change-me}
app.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
